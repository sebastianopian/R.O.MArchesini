
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opere - GOCCE DI PUREZZA</title>

  <style>
    /* Reset base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .container > div {
      padding-top: 5%;   
    }

    .page-title {
      text-align: center;
      font-size: 3rem;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      margin-bottom: 1rem;
      margin-top: 10rem;
      letter-spacing: 0.05em;
    }

    body {
      /* Immagine di sfondo fissa: assicurati che il percorso sia corretto */
      background-image: url('../assets/images/colore.jpeg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      min-height: 100vh;
      font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;

      /* Per migliorare la leggibilità del testo, aggiungiamo un overlay scuro tramite pseudoelemento */
      position: relative;
    }

    /* Overlay semitrasparente per rendere il testo più leggibile (opzionale, ma consigliato) */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
      pointer-events: none;
    }

    /* Contenitore principale, posizionato sopra l'overlay */
    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .opere-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      margin: 3rem 0;
    }

    .opere-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 200px;
      height: 200px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      color: white;
      text-decoration: none;
      font-size: 1.3rem;
      font-weight: bold;
      transition: background 0.3s, transform 0.2s;
    }

    .opere-card:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.02);
    }

    .opere-card span {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    /* Responsive per schermi piccoli */
    @media (max-width: 500px) {
      .opere-card {
        width: 150px;
        height: 150px;
        font-size: 1rem;
      }
      .opere-card span {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<h1 class="page-title">Opere</h1>
<body>
  <div class="container">
    <div class="opere-buttons">
      <a href="../opere/dipinti.html" class="opere-card">
        <span></span>
        Dipinti
      </a>
      <a href="../opere/libri.html" class="opere-card">
        <span></span>
        Libri
      </a>
    </div>
  </div>
</body>
</html>
